<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AromaWeb - Reservation</title>
    <link rel="stylesheet" href="../style/common-style.css">
    <link rel="stylesheet" href="../style/form-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <a href="../index.html" class="logo">AromaWeb</a>
        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="reservation.html" class="active">Reservation</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="taste-quiz.html">Taste Quiz</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="branches.html">Branches</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
        <div class="auth-buttons" id="auth-buttons">
        </div>
    </header>

    <main class="content" style="padding-top: 2rem;">
        <div class="form-box large" style="margin-top: 0;">
            <div class="form-header">
                <h2 class="page-title" style="margin-bottom: 0.5rem;">Book a Table</h2>
                <p class="page-subtitle" style="margin-top: 0;">Reserve a spot at one of our AromaWeb locations for a fresh, authentic dining experience.</p>
            </div>
            
            <form action="#" method="POST">
                <div class="form-row">
                    <div class="input-group">
                        <label for="fullname" class="label">Full Name</label>
                        <input type="text" id="fullname" name="fullname" class="input-field" placeholder="e.g. John Doe" required>
                    </div>
                    <div class="input-group">
                        <label for="phone" class="label">Phone Number</label>
                        <input type="tel" id="phone" name="phone" class="input-field" placeholder="e.g. (+997) 9876557273" pattern="\d{10}" title="Please enter a valid 10-digit phone number" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="input-group">
                        <label for="date" class="label">Reservation Date</label>
                        <input type="date" id="date" name="date" class="input-field" min="2026-06-01" max="2067-06-07" required>
                    </div>
                    <div class="input-group">
                        <label for="time" class="label">Reservation Time</label>
                        <input type="time" id="time" name="time" class="input-field" min="11:00" max="22:00" required>
                    </div>
                </div>

                <div class="form-row">
                    <div class="input-group">
                        <label for="people" class="label">Number of People</label>
                        <select id="people" name="people" class="dropdown" required>
                            <option value="1">1 Person</option>
                            <option value="2" selected>2 People</option>
                            <option value="3">3 People</option>
                            <option value="4">4 People</option>
                            <option value="5">5 People</option>
                            <option value="6">6 People</option>
                            <option value="7+">7+ People (Large Group)</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="tables" class="label">Number of Tables</label>
                        <select id="tables" name="tables" class="dropdown" required>
                            <option value="1" selected>1 Table</option>
                            <option value="2">2 Tables</option>
                            <option value="3">3 Tables</option>
                            <option value="4+">4+ Tables</option>
                        </select>
                    </div>
                </div>
                    <div class="input-group">
                        <label for="branches" class="label">Branch Location</label>
                        <select id="branches" name="branches" class="dropdown" required>
                            <option value="1" selected>Branches</option>
                            <option value="2">Kathmandu,New Baneshwor</option>
                            <option value="3">Pokhara, Lakeside</option>
                            <option value="4">Chitwan, Bhartapur</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="requests" class="label">Special Requests (Optional)</label>
                        <textarea id="requests" name="requests" class="textarea-field" placeholder="Any dietary restrictions, seating preferences, or special occasions?"></textarea>
                    </div>
                    <button onclick="alertAndRedirect(event)"class="btn btn-orange btn-full">Confirm Reservation</button>
                </div>
            </form>
        </div>
    </main>
    <script src="../script/auth-script.js"></script>
    <script>

            function alertAndRedirect(event) {
                event.preventDefault();
            alert("WIP, will store data inside a json file.");
            window.location.href = "gallery.html";
            }
    </script>
</body>
</html>
