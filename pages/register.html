<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AromaWeb - Register</title>
    <link rel="stylesheet" href="../style/common-style.css">
    <link rel="stylesheet" href="../style/form-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <a href="../index.html" class="logo">AromaWeb</a>
        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="reservation.html">Reservation</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="branches.html">Branches</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
        <div class="auth-buttons" id="auth-buttons">
        </div>
    </header>

    <main class="content" style="display: flex; align-items: center; justify-content: center; padding-top: 2rem; padding-bottom: 2rem;">
        <div class="form-box large">
            <div class="form-header">
                <h2>Create an Account</h2>
                <p>Join AromaWeb for fresh, daily home-cooked meals</p>
            </div>
            
            <form action="#" method="POST">
                <div class="form-row">
                    <div class="input-group">
                        <label for="fullname" class="label">Full Name</label>
                        <input type="text" id="fullname" name="fullname" class="input-field" placeholder="e.g. John Doe" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="phone" class="label">Phone Number</label>
                        <input type="tel" id="phone" name="phone" class="input-field" placeholder="e.g. (+997) 9876557273" pattern="\d{10}" title="Please enter a valid 10-digit phone number" required>
                    </div>
                </div>
                
                <div class="form-row">
                    <div class="input-group">
                        <label for="email" class="label">Email Address</label>
                        <input type="email" id="email" name="email" class="input-field" placeholder="Enter your email" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="password" class="label">Password</label>
                        <input type="password" id="password" name="password" class="input-field" placeholder="Create a password" minlength="8" pattern="(?=.*\d).{8,}" title="Must contain at least one number and be 8 or more characters" required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="address" class="label">Delivery Address</label>
                    <input type="text" id="address" name="address" class="input-field" placeholder="Street Address, Apt/Suite" required>
                </div>

                <div class="input-group">
                    <label for="dietary" class="label">Dietary Preferences</label>
                    <select id="dietary" name="dietary" class="dropdown">
                        <option value="none">None</option>
                        <option value="vegetarian">Vegetarian</option>
                        <option value="vegan">Vegan</option>
                        <option value="gluten-free">Gluten-Free</option>
                        <option value="halal">Halal</option>
                    </select>
                </div>
                
                <div class="checkbox-group" style="margin-top: 1.5rem;">
                    <input type="checkbox" id="terms" class="checkbox" required>
                    <label for="terms" style="font-size: 0.9rem;">
                        I agree to the 
                        <a href="../assets/documents/terms-of-service.pdf" target="_blank" class="form-link">Terms of Service</a> 
                        and 
                        <a href="../assets/documents/privacy-policy.pdf" target="_blank" class="form-link">Privacy Policy</a>
                    </label>
                </div>
                
                <button type="submit" class="btn btn-orange btn-full" style="margin-top: 1.5rem;">Register Account</button>
            </form>
            
            <div class="form-footer">
                Already have an account? <a href="login.html" class="form-link">Login here</a>
            </div>
        </div>
    </main>
    <script src="../script/auth-script.js"></script>
    <script src="../script/register-script.js"></script>
</body>
</html>
