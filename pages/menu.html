<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AromaWeb - Menu</title>
    <link rel="stylesheet" href="../style/common-style.css">
    <link rel="stylesheet" href="../style/menu-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <a href="../index.html" class="logo">AromaWeb</a>
        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="menu.html" class="active">Menu</a></li>
                <li><a href="reservation.html">Reservation</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="branches.html">Branches</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
        <div class="hamburger" id="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
        <div class="auth-buttons" id="auth-buttons">
        </div>
    </header>

    <main class="content" style="padding: 2rem 6%;">
        <div class="filter-section">
            <div class="filter-stats" id="filter-stats">Loading...</div>
            <div class="filter-controls">
                <div class="search-box">
                    <input type="text" id="search-input" placeholder="Search...">
                </div>
                <select id="filter-category" class="filter-dropdown">
                    <option value="">Category (All)</option>
                </select>
                <select id="filter-diet" class="filter-dropdown">
                    <option value="">Diet (All)</option>
                </select>
                <select id="filter-spice" class="filter-dropdown">
                    <option value="">Spice (All)</option>
                </select>
                <button id="btn-filter" class="btn btn-orange" style="padding: 0.6rem 2rem;">Filter</button>
            </div>
        </div>

        <div id="menu-grid" class="menu-grid">
            <!-- Menu items injected here -->
        </div>
    </main>

    <script src="../script/auth-script.js"></script>
    <script src="../script/menu-script.js"></script>
</body>
</html>
