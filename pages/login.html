<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AromaWeb - Login</title>
    <link rel="stylesheet" href="../style/common-style.css">
    <link rel="stylesheet" href="../style/form-style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <header class="navbar">
        <a href="../index.html" class="logo">AromaWeb</a>
        <nav>
            <ul>
                <li><a href="../index.html">Home</a></li>
                <li><a href="menu.html">Menu</a></li>
                <li><a href="reservation.html">Reservation</a></li>
                <li><a href="gallery.html">Gallery</a></li>
                <li><a href="taste-quiz.html">Taste Quiz</a></li>
                <li><a href="about.html">About Us</a></li>
                <li><a href="branches.html">Branches</a></li>
                <li><a href="contact.html">Contact Us</a></li>
            </ul>
        </nav>
        <div class="auth-buttons" id="auth-buttons">
        </div>
    </header>

    <main class="content" style="display: flex; align-items: center; justify-content: center;">
        <div class="form-box">
            <div class="form-header">
                <h2>Welcome Back</h2>
                <p>Login to your AromaWeb account</p>
            </div>
            
            <form action="#" method="POST">
                <div class="input-group">
                    <label for="email" class="label">Email Address</label>
                    <input type="email" id="email" name="email" class="input-field" placeholder="Enter your email" required>
                </div>
                
                <div class="input-group">
                    <label for="password" class="label">Password</label>
                    <input type="password" id="password" name="password" class="input-field" placeholder="Enter your password" required>
                </div>
                
                <div class="checkbox-group" style="justify-content: space-between; margin-bottom: 1.5rem;">
                    <div style="display: flex; align-items: center; gap: 0.5rem;">
                        <input type="checkbox" id="remember" class="checkbox">
                        <label for="remember" style="font-size: 0.9rem;">Remember me</label>
                    </div>
                    <a href="#" id="forgot-password-link" class="form-link" style="font-size: 0.9rem;">Forgot password?</a>
                </div>
                
                <button type="submit" class="btn btn-orange btn-full">Login to Account</button>
            </form>
            
            <div class="form-footer">
                Don't have an account? <a href="register.html" class="form-link">Register here</a>
            </div>
        </div>
    </main>
    <script src="../script/auth-script.js"></script>
    <script src="../script/login-script.js"></script>
</body>
</html>
